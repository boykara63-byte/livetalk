# Remplacez <YOUR_VPS_PUBLIC_IP> par l'adresse IP publique réelle de votre VPS.
external-ip=<YOUR_VPS_PUBLIC_IP>

listening-ip=0.0.0.0
listening-port=3478
tls-listening-port=5349

realm=livetalk-turn
fingerprint
lt-cred-mech
no-cli
no-loopback-peers

# Remplacez par un utilisateur et un mot de passe forts.
user=YOUR_TURN_USERNAME:YOUR_TURN_CREDENTIAL

# Plage de ports UDP allouée aux relais.
min-port=10000
max-port=20000

# Décommentez et pointez vers des vrais certificats pour activer TURNS (tls://).
# cert=/etc/coturn/cert.pem
# pkey=/etc/coturn/key.pem

log-file=stdout
verbose
